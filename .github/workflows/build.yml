name: Build and push sandbox image

on:
  push:
    branches: [main]
    paths: ['sandbox/Containerfile']
    tags: ['v*']

env:
  IMAGE: ghcr.io/data-fair/tool-ai-sandbox

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: podman build -t $IMAGE -f sandbox/Containerfile sandbox/

      - name: Tag and push latest
        run: |
          podman push $IMAGE:latest

      - name: Tag and push version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          podman tag $IMAGE $IMAGE:$VERSION
          podman push $IMAGE:$VERSION
